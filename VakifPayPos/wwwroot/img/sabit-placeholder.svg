  <path d="M 195 240 Q 225 245 220 265 T 200 285 T 225 305 L 245 315" stroke="#475569" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- 3. Tezgah Üstü Ağır Masa Standı (Dock / Foot) -->
