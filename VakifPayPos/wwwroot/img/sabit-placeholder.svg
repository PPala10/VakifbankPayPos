  <text x="140" y="106" fill="#38BDF8" font-family="'Segoe UI', Roboto, sans-serif" font-size="7" font-weight="800" text-anchor="middle">HAT: ONLINE (LAN)</text>
  
  <text x="140" y="132" fill="#FFFFFF" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="900" text-anchor="middle">₺149,00/ay</text>
