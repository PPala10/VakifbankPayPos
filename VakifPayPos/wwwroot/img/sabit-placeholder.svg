<svg width="280" height="340" viewBox="0 0 280 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 1. Taban Gölgesi -->
  <ellipse cx="140" cy="325" rx="80" ry="9" fill="#000000" fill-opacity="0.12"/>

